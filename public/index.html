<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculatrice</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #eef2ff, #f8fafc);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 10px;
      }

      .card {
        background: white;
        width: 100%;
        max-width: 420px;
        padding: 24px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      }

      h1 {
        margin-top: 0;
        margin-bottom: 20px;
        text-align: center;
        color: #1e293b;
      }

      .row {
        display: flex;
        gap: 10px;
        margin-bottom: 14px;
      }

      input,
      select,
      button {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #cbd5e1;
        font-size: 16px;
        outline: none;
      }

      input:focus,
      select:focus {
        border-color: #2563eb;
      }

      button {
        background: #2563eb;
        color: white;
        border: none;
        cursor: pointer;
        font-weight: bold;
        transition: 0.2s;
      }

      button:hover {
        background: #1d4ed8;
      }

      .result {
        margin-top: 16px;
        padding: 14px;
        border-radius: 10px;
        background: #eef4ff;
        font-weight: bold;
        text-align: center;
        color: #1e3a8a;
      }

      .history {
        margin-top: 18px;
        font-size: 14px;
      }

      .history strong {
        display: block;
        margin-bottom: 8px;
        color: #334155;
      }

      .history ul {
        margin: 0;
        padding-left: 18px;
        max-height: 180px;
        overflow-y: auto;
      }

      .history li {
        margin-bottom: 6px;
        color: #475569;
      }

      .buttons {
        display: flex;
        gap: 10px;
      }

      .clear-btn {
        background: #ef4444;
      }

      .clear-btn:hover {
        background: #dc2626;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Calculatrice</h1>

      <div class="row">
        <input type="number" id="a" placeholder="Premier nombre" />
        <input type="number" id="b" placeholder="Deuxième nombre" />
      </div>

      <div class="row">
        <select id="op">
          <option value="+">Addition (+)</option>
          <option value="-">Soustraction (-)</option>
          <option value="*">Multiplication (*)</option>
          <option value="/">Division (/)</option>
        </select>
      </div>

      <div class="row buttons">
        <button onclick="calculate()">Calculer</button>
        <button class="clear-btn" onclick="clearFields()">Effacer</button>
      </div>

      <div class="result" id="result">Résultat : --</div>

      <div class="history">
        <strong>Historique :</strong>
        <ul id="history"></ul>
      </div>
    </div>

    <script>
      async function calculate() {
        const a = document.getElementById("a").value;
        const b = document.getElementById("b").value;
        const op = document.getElementById("op").value;
        const resultBox = document.getElementById("result");
        const history = document.getElementById("history");

        if (a === "" || b === "") {
          resultBox.textContent = "Erreur : veuillez remplir les deux nombres";
          return;
        }

        try {
          const response = await fetch("/api/calculate", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ a, b, op }),
          });

          const data = await response.json();

          if (!response.ok) {
            resultBox.textContent = "Erreur : " + data.error;
            return;
          }

          resultBox.textContent = `Résultat : ${data.result}`;

          const li = document.createElement("li");
          li.textContent = `${a} ${op} ${b} = ${data.result}`;
          history.prepend(li);
        } catch (error) {
          resultBox.textContent = "Erreur serveur";
          console.error(error);
        }
      }

      function clearFields() {
        document.getElementById("a").value = "";
        document.getElementById("b").value = "";
        document.getElementById("op").value = "+";
        document.getElementById("result").textContent = "Résultat : --";
      }
    </script>
  </body>
</html>
